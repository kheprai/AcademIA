<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<style>
  .light { display: block; }
  .dark { display: none; }
  @media (prefers-color-scheme: dark) {
    .light { display: none; }
    .dark { display: block; }
  }
</style>
<image class="light" width="32" height="32" href="data:image/png;base64,"/>
<image class="dark" width="32" height="32" href="data:image/png;base64,"/>
</svg>